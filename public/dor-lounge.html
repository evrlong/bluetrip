<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<title>SELG Airlines Lounge</title>
<style>
  @page {
    size: A4 portrait;
    margin: 0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 210mm;
    height: 297mm;
    background: #fff;
    font-family: "Georgia", "Times New Roman", serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .ark {
    width: 210mm;
    height: 297mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12mm 14mm 14mm;
    gap: 0;
  }

  /* Hull-guide */
  .hull-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2mm;
    margin-bottom: 5mm;
  }
  .hull {
    width: 8mm;
    height: 8mm;
    border: 1.5px dashed #aaa;
    border-radius: 50%;
  }
  .hull-tekst {
    font-size: 7px;
    color: #bbb;
    letter-spacing: 0.5px;
    font-family: Arial, sans-serif;
    text-transform: uppercase;
  }

  /* Selve skiltet */
  .skilt {
    width: 100%;
    flex: 1;
    background: #077e87;
    border-radius: 8mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 14mm 12mm 12mm;
    position: relative;
    overflow: hidden;
  }

  /* Dekorativ bakgrunnssirkel */
  .skilt::before {
    content: "";
    position: absolute;
    width: 220mm;
    height: 220mm;
    border-radius: 50%;
    border: 18mm solid rgba(255,255,255,0.05);
    top: -60mm;
    right: -60mm;
    pointer-events: none;
  }
  .skilt::after {
    content: "";
    position: absolute;
    width: 160mm;
    height: 160mm;
    border-radius: 50%;
    border: 10mm solid rgba(255,255,255,0.04);
    bottom: -50mm;
    left: -40mm;
    pointer-events: none;
  }

  /* Gull-ramme */
  .gull-ramme {
    position: absolute;
    inset: 6mm;
    border: 1.5px solid rgba(240, 200, 80, 0.4);
    border-radius: 5mm;
    pointer-events: none;
  }

  .logo-seksjon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 1;
  }

  .logo {
    width: 130mm;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .skillelinje {
    width: 60mm;
    height: 1px;
    background: rgba(240, 200, 80, 0.5);
    margin: 8mm 0;
  }

  .lounge-tekst {
    z-index: 1;
    text-align: center;
  }

  .lounge-tittel {
    font-size: 52px;
    font-weight: 400;
    color: #f0e080;
    letter-spacing: 10px;
    text-transform: uppercase;
    line-height: 1;
    font-family: "Georgia", serif;
  }

  .lounge-undertittel {
    margin-top: 4mm;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }

  .footer-tekst {
    z-index: 1;
    text-align: center;
  }

  .footer-linje {
    width: 40mm;
    height: 1px;
    background: rgba(240, 200, 80, 0.3);
    margin: 0 auto 5mm;
  }

  .velkommen {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
