<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<title>Toalett – Retningsskilt</title>
<style>
  @page { size: A4 landscape; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Arial Black", Arial, sans-serif;
    background: #222;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .kontroll {
    padding: 14px 20px; display: flex; gap: 10px; align-items: center; background: #1a1a2e;
  }
  .kontroll-label { color: #f0c040; font-size: 13px; letter-spacing: 1px; font-weight: 700; margin-right: 4px; }
  .retning-knapp {
    padding: 9px 22px; font-size: 17px; font-weight: 900;
    border: none; border-radius: 6px; cursor: pointer;
    background: #e4e4e4; color: #1a1a2e;
  }
  .retning-knapp.aktiv { background: #f5b800; color: #1a1a1a; }
  .print-btn {
    margin-left: auto; padding: 9px 24px; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; background: #f5b800; color: #1a1a1a;
    border: none; border-radius: 6px; cursor: pointer;
  }

  .ark {
    width: 297mm; height: 210mm;
    display: flex; flex-direction: column;
    align-items: center; padding: 8mm 12mm 10mm; background: #fff;
  }
  .hull-rad {
    width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5mm;
  }
  .hull { width: 8mm; height: 8mm; border: 1.5px dashed #aaa; border-radius: 50%; }
  .hull-tekst { font-size: 7px; color: #bbb; font-family: Arial, sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }

  .skilt {
    width: 100%; flex: 1;
    background: #f5b800;
    border-radius: 6mm;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 14mm;
    gap: 8mm;
  }

  .toilets-tekst {
    font-size: 58px; font-weight: 900; color: #1a1a1a;
    white-space: nowrap; letter-spacing: -1px; flex-shrink: 0;
  }

  .ikoner { display: flex; gap: 5mm; flex-shrink: 0; }

  .sirkel {
    width: 46mm; height: 46mm;
    background: #1a1a1a; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .pil-wrapper {
    flex: 1; display: flex; align-items: center; justify-content: flex-end;
  }

  /* Venstre */
  body.venstre .skilt       { flex-direction: row-reverse; }
  body.venstre .pil-wrapper { justify-content: flex-end; }
  body.venstre .pil         { transform: scaleX(-1); }

  /* Rett frem: roter pilen opp */
  body.rettfrem .pil { transform: rotate(-90deg); }
  body.rettfrem .pil-wrapper { justify-content: center; }

  @media print {
    body { background: #fff; }
    .kontroll { display: none !important; }
  }
</style>
</head>
<body class="hoyre">

<div class="kontroll">
  <span class="kontroll-label">PILRETNING:</span>
  <button class="retning-knapp" id="btn-venstre"   onclick="settRetning('venstre')">← Venstre</button>
  <button class="retning-knapp" id="btn-rettfrem"  onclick="settRetning('rettfrem')">↑ Rett frem</button>
  <button class="retning-knapp aktiv" id="btn-hoyre" onclick="settRetning('hoyre')">Høyre →</button>
  <button class="print-btn" onclick="window.print()">🖨 Skriv ut</button>
</div>

<div class="ark">
  <div class="hull-rad">
    <div class="hull"></div>
    <div class="hull-tekst">✂ hull til snor — heng fra tak</div>
    <div class="hull"></div>
  </div>

  <div class="skilt">
    <div class="toilets-tekst">Toalett</div>

    <div class="ikoner">

      <!-- Dame: trekantformet kjole, klassisk WC-ikon -->
      <div class="sirkel">
        <svg width="76" height="112" viewBox="0 0 48 74" fill="white">
          <circle cx="24" cy="8" r="8"/>
          <path d="M17,18 L1,72 L47,72 L31,18 Z"/>
        </svg>
      </div>

      <!-- Herre: bred T-form med armer ut, to ben -->
      <div class="sirkel">
        <svg width="76" height="112" viewBox="0 0 48 74" fill="white">
          <circle cx="24" cy="8" r="8"/>
          <!-- Kropp -->
          <rect x="18" y="18" width="12" height="22" rx="2"/>
          <!-- Venstre arm (bred) -->
          <rect x="1"  y="18" width="17" height="7" rx="3"/>
          <!-- Høyre arm (bred) -->
          <rect x="30" y="18" width="17" height="7" rx="3"/>
          <!-- Venstre ben -->
          <rect x="18" y="40" width="9"  height="32" rx="3"/>
          <!-- Høyre ben -->
          <rect x="28" y="40" width="9"  height="32" rx="3"/>
        </svg>
      </div>

      <!-- Handicap: standard ISA-symbol -->
      <div class="sirkel">
        <svg width="76" height="112" viewBox="0 0 48 74" fill="white">
          <!-- Hode -->
          <circle cx="17" cy="6" r="6"/>
          <!-- Overkropp (lener litt fremover) -->
          <rect x="13" y="14" width="7" height="18" rx="2"/>
          <!-- Arm fremover (horisontal) -->
          <rect x="13" y="20" width="20" height="5" rx="2"/>
          <!-- Sete (horisontal) -->
          <rect x="20" y="26" width="16" height="5" rx="2"/>
          <!-- Ryggstøtte (vertikal) -->
          <rect x="34" y="13" width="5" height="18" rx="2"/>
          <!-- Fotstøtte ned + ut -->
          <rect x="13" y="32" width="7" height="14" rx="2"/>
          <rect x="13" y="43" width="16" height="5" rx="2"/>
          <!-- Stort bakhjul -->
          <circle cx="22" cy="59" r="13" fill="none" stroke="white" stroke-width="4"/>
          <!-- Lite fremhjul -->
          <circle cx="38" cy="64" r="5"  fill="none" stroke="white" stroke-width="3.5"/>
        </svg>
      </div>

    </div>

    <!-- Pil (høyre som standard, roteres via CSS) -->
    <div class="pil-wrapper">
      <div class="pil">
        <svg width="124" height="78" viewBox="0 0 124 78" fill="#1a1a1a">
          <rect x="0" y="22" width="84" height="34" rx="5"/>
          <polygon points="74,0 124,39 74,78"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
  function settRetning(r) {
    document.body.className = r;
    ['venstre','rettfrem','hoyre'].forEach(function(id) {
      document.getElementById('btn-' + id).classList.toggle('aktiv', id === r);
    });
  }
</script>
</body>
</html>
