<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<title>Toalett – WC</title>
<style>
  @page { size: A5 landscape; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 210mm; height: 148mm;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    font-family: "Arial Black", Arial, sans-serif;
  }
  .ark {
    width: 210mm; height: 148mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6mm 10mm 8mm;
  }
  .hull-rad {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-bottom: 4mm;
  }
  .hull {
    width: 7mm; height: 7mm;
    border: 1.5px dashed #aaa;
    border-radius: 50%;
  }
  .hull-tekst {
    text-align: center;
    font-size: 7px;
    color: #bbb;
    font-family: Arial, sans-serif;
    letter-spacing: 0.5px;
    flex: 1;
    line-height: 7mm;
  }
  .skilt {
    width: 100%;
    flex: 1;
    background: #077e87;
    border-radius: 6mm;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10mm;
    padding: 6mm 12mm;
    position: relative;
  }
  .skillelinje-v {
    width: 0.5mm;
    height: 70%;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .symbol {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
    flex: 1;
  }
  .figur svg {
    display: block;
  }
  .symbol-tekst {
    font-size: 13px;
    font-weight: 900;
    color: rgba(255,255,255,0.85);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .wc-tekst {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px;
    font-weight: 900;
    color: rgba(255,255,255,0.25);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
<div class="ark">
  <div class="hull-rad">
    <div class="hull"></div>
    <div class="hull-tekst">✂ HULL TIL SNOR — HENG FRA TAK</div>
    <div class="hull"></div>
  </div>
  <div class="skilt">

    <!-- Dame -->
    <div class="symbol">
      <div class="figur">
        <svg width="64" height="96" viewBox="0 0 64 96" fill="white" xmlns="http://www.w3.org/2000/svg">
          <!-- Hode -->
          <circle cx="32" cy="10" r="9"/>
          <!-- Kjole/kropp -->
          <path d="M20,24 Q32,20 44,24 L50,72 L38,72 L32,52 L26,72 L14,72 Z"/>
          <!-- Ben -->
          <rect x="22" y="72" width="8" height="22" rx="3"/>
          <rect x="34" y="72" width="8" height="22" rx="3"/>
        </svg>
      </div>
      <div class="symbol-tekst">Dame</div>
    </div>

    <div class="skillelinje-v"></div>

    <!-- Herre -->
    <div class="symbol">
      <div class="figur">
        <svg width="64" height="96" viewBox="0 0 64 96" fill="white" xmlns="http://www.w3.org/2000/svg">
          <!-- Hode -->
          <circle cx="32" cy="10" r="9"/>
          <!-- Kropp -->
          <rect x="21" y="22" width="22" height="34" rx="3"/>
          <!-- Venstre arm -->
          <rect x="8" y="22" width="11" height="7" rx="3"/>
          <!-- Høyre arm -->
          <rect x="45" y="22" width="11" height="7" rx="3"/>
          <!-- Ben -->
          <rect x="21" y="56" width="9" height="38" rx="3"/>
          <rect x="34" y="56" width="9" height="38" rx="3"/>
        </svg>
      </div>
      <div class="symbol-tekst">Herre</div>
    </div>

  </div>
</div>
</body>
</html>
